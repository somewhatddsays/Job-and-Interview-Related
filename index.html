<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>15 Papers That Shaped NLP & LLMs</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 60px;
      font-size: 2.7rem;
      font-weight: 600;
    }

    h1 span {
      color: #3b82f6;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 60px 8%;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.6);
    }

    .card h2 {
      color: #3b82f6;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    .card a {
      display: block;
      text-decoration: none;
      color: #e2e8f0;
      margin: 8px 0;
      transition: color 0.2s ease;
      font-size: 0.95rem;
    }

    .card a:hover {
      color: #60a5fa;
    }
  </style>

</head>

<body>

  <h1>15 Papers That Shaped <span>NLP & LLMs</span></h1>

  <div class="timeline">

    <div class="card">
      <h2>2017</h2>
      <a href="https://arxiv.org/abs/1706.03762" target="_blank">
        Attention Is All You Need
      </a>
    </div>

    <div class="card">
      <h2>2018</h2>
      <a href="https://arxiv.org/abs/1810.04805" target="_blank">
        BERT
      </a>
    </div>

    <div class="card">
      <h2>2020</h2>
      <a href="https://arxiv.org/abs/2005.14165" target="_blank">
        GPT-3: Few-Shot Learners
      </a>
      <a href="https://arxiv.org/abs/1910.10683" target="_blank">
        T5
      </a>
      <a href="https://arxiv.org/abs/2001.08361" target="_blank">
        Scaling Laws
      </a>
      <a href="https://arxiv.org/abs/2005.11401" target="_blank">
        RAG
      </a>
    </div>

    <div class="card">
      <h2>2021</h2>
      <a href="https://arxiv.org/abs/2106.09685" target="_blank">
        LoRA
      </a>
    </div>

    <div class="card">
      <h2>2022</h2>
      <a href="https://arxiv.org/abs/2201.11903" target="_blank">
        Chain-of-Thought Prompting
      </a>
      <a href="https://arxiv.org/abs/2203.11171" target="_blank">
        Self-Consistency
      </a>
      <a href="https://arxiv.org/abs/2205.11916" target="_blank">
        Toolformer
      </a>
      <a href="https://arxiv.org/abs/2203.02155" target="_blank">
        Instruction Tuning
      </a>
      <a href="https://arxiv.org/abs/2112.01488" target="_blank">
        ColBERTv2
      </a>
    </div>

    <div class="card">
      <h2>2023</h2>
      <a href="https://arxiv.org/abs/2306.05685" target="_blank">
        LLMs as a Judge
      </a>
    </div>

    <div class="card">
      <h2>2025</h2>
      <a href="https://arxiv.org/abs/2401.02954" target="_blank">
        DeepSeek-R1
      </a>
    </div>

  </div>

</body>
</html>
